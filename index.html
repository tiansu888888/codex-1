<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Yorozuya Run — Playable Preview</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="hud">
    <div class="card">
      <h1>Yorozuya Run (Preview Build)</h1>
      <p>Move: A/D · Jump: Space · Attack: J · Dash: K · Switch: 1/2/3</p>
      <p id="dialogue">Gintoki: "We're low on budget, so rectangles it is."</p>
    </div>
    <div class="stats">
      <div>👤 Character: <span id="charName">Gintoki</span></div>
      <div>❤️ Sweet Tooth: <span id="hp">5</span>/5</div>
      <div>⚡ Samurai Spirit: <span id="sp">100</span>/100</div>
      <div>💰 Yen: <span id="coins">0</span></div>
      <div>🎯 Objective: Reach gate + collect 120 Yen</div>
    </div>
  </div>

  <canvas id="game" width="960" height="540"></canvas>

  <div class="touch-controls">
    <button data-k="a">←</button><button data-k="d">→</button>
    <button data-k=" ">⤒</button><button data-k="j">⚔</button><button data-k="k">✦</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
